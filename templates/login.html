{{define "login_content"}}
<div class="min-h-screen flex items-center justify-center">
    <div class="w-full max-w-md">
        <div class="bg-gray-800 rounded-lg shadow-lg p-8 border border-gray-700">
            <h2 class="text-2xl font-bold text-white mb-6 text-center">Proxy Balancer</h2>
            {{if .error}}
            <div class="bg-red-900/50 border border-red-500 text-red-200 px-4 py-2 rounded mb-4 text-sm">{{.error}}</div>
            {{end}}
            <form method="POST" action="/login">
                <div class="mb-4">
                    <label class="block text-gray-300 text-sm mb-2" for="username">Username</label>
                    <input class="w-full px-3 py-2 bg-gray-700 border border-gray-600 rounded text-white focus:outline-none focus:border-blue-500" type="text" name="username" required>
                </div>
                <div class="mb-6">
                    <label class="block text-gray-300 text-sm mb-2" for="password">Password</label>
                    <input class="w-full px-3 py-2 bg-gray-700 border border-gray-600 rounded text-white focus:outline-none focus:border-blue-500" type="password" name="password" required>
                </div>
                <button class="w-full bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded transition" type="submit">Sign in</button>
            </form>
        </div>
    </div>
</div>
{{end}}
