{{define "layout"}}<!DOCTYPE html>
<html lang="en" class="h-full bg-gray-900">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Proxy Balancer</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/htmx.org@1.9.12"></script>
</head>
<body class="h-full">
    <div class="flex h-full">
        {{if .hide_sidebar}}{{else}}
        <nav class="w-64 bg-gray-800 border-r border-gray-700 flex flex-col min-h-screen">
            <div class="p-4 border-b border-gray-700">
                <h1 class="text-lg font-bold text-white">Proxy Balancer</h1>
            </div>
            <div class="flex-1 p-4 space-y-1">
                <a href="/" class="flex items-center px-3 py-2 text-sm rounded-md {{if eq .active "dashboard"}}bg-gray-700 text-white{{else}}text-gray-300 hover:bg-gray-700{{end}}">
                    <svg class="w-5 h-5 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2V6zM14 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2V6zM4 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2v-2zM14 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2v-2z"/></svg>
                    Dashboard
                </a>
                <a href="/backends" class="flex items-center px-3 py-2 text-sm rounded-md {{if eq .active "backends"}}bg-gray-700 text-white{{else}}text-gray-300 hover:bg-gray-700{{end}}">
                    <svg class="w-5 h-5 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 12h14M5 12a2 2 0 01-2-2V6a2 2 0 012-2h14a2 2 0 012 2v4a2 2 0 01-2 2M5 12a2 2 0 00-2 2v4a2 2 0 002 2h14a2 2 0 002-2v-4a2 2 0 00-2-2m-2-4h.01M17 16h.01"/></svg>
                    Backends
                </a>
                <a href="/clients" class="flex items-center px-3 py-2 text-sm rounded-md {{if eq .active "clients"}}bg-gray-700 text-white{{else}}text-gray-300 hover:bg-gray-700{{end}}">
                    <svg class="w-5 h-5 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197M13 7a4 4 0 11-8 0 4 4 0 018 0z"/></svg>
                    Clients
                </a>
                <a href="/subscriptions" class="flex items-center px-3 py-2 text-sm rounded-md {{if eq .active "subscriptions"}}bg-gray-700 text-white{{else}}text-gray-300 hover:bg-gray-700{{end}}">
                    <svg class="w-5 h-5 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 21h10a2 2 0 002-2V9.414a1 1 0 00-.293-.707l-5.414-5.414A1 1 0 0012.586 3H7a2 2 0 00-2 2v14a2 2 0 002 2z"/></svg>
                    Subscriptions
                </a>
            </div>
            <div class="p-4 border-t border-gray-700">
                <a href="/logout" class="flex items-center px-3 py-2 text-sm text-gray-300 hover:bg-gray-700 rounded-md">
                    <svg class="w-5 h-5 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/></svg>
                    Logout
                </a>
            </div>
        </nav>
        {{end}}
        <main class="flex-1 overflow-auto bg-gray-900 min-h-screen">
            <div class="p-6">
                {{.Content}}
            </div>
        </main>
    </div>
</body>
</html>{{end}}
